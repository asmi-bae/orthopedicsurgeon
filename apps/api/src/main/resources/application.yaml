app:
  frontend:
    public-url: ${PUBLIC_FRONTEND_URL:http://localhost:4201}
    admin-url: ${ADMIN_FRONTEND_URL:http://localhost:4200}
  rate-limit:
    default-limit: 60
    default-window: 60
    login-limit: 5
    login-window: 900
    search-limit: 20
    search-window: 60
  security:
    admin:
      enable-ip-check: true
      ip-allowlist:
        - 127.0.0.1
        - "::1"

security:
  cors:
    web-origins: http://localhost:4201,https://orthopedicsurgeon.com
    admin-origins: http://localhost:4200,https://admin.orthopedicsurgeon.com

jwt:
  secret: ${JWT_SECRET:7a5996cc5a03d462996453eab41f39e0d73fff7f8a48b53aa65a4577c4fd8979f}
  access-token-expiry: 900 # 15 minutes
  refresh-token-expiry: 604800 # 7 days

management:
  endpoints:
    web:
      exposure:
        include: "health,info,metrics,prometheus"
  endpoint:
    health:
      show-details: when_authorized
    prometheus:
      enabled: true

spring:
  profiles:
    active: local
  devtools:
    restart:
      enabled: true
      additional-paths: src/main/java
      exclude: static/**,public/**,templates/**,test/**
    livereload:
      enabled: true
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 5MB
  flyway:
    clean-on-validation-error: false
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/orthopedic_db}
    username: ${SPRING_DATASOURCE_USERNAME:shoaib}
    password: ${SPRING_DATASOURCE_PASSWORD:shoaib123}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      idle-timeout: 300000
      connection-timeout: 20000
      max-lifetime: 1200000
      pool-name: OrthopedicHikariPool
  jpa:
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          batch_size: 25
          order_inserts: true
          order_updates: true
  cache:
    type: redis
    redis:
      time-to-live: 3600000
  data:
    redis:
      host: localhost
      port: 6379
  thymeleaf:
    cache: false
    check-template-location: true
  mvc:
    static-path-pattern: /static/**
  web:
    resources:
      cache:
        period: 0
  task:
    execution:
      pool:
        core-size: 10
        max-size: 50
        queue-capacity: 100
        keep-alive: 60s
      thread-name-prefix: ortho-async-
  mail:
    host: ${SMTP_HOST:smtp.gmail.com}
    port: ${SMTP_PORT:587}
    username: ${SMTP_USER:admin@orthopedicsurgeon.com}
    password: ${SMTP_PASS:password}
    from: ${SMTP_FROM:admin@orthopedicsurgeon.com}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
          ssl:
            trust: "*"
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID:default-client-id}
            client-secret: ${GOOGLE_CLIENT_SECRET:default-client-secret}
            scope:
              - email
              - profile

twilio:
  account-sid: ${TWILIO_SID:your_sid}
  auth-token: ${TWILIO_AUTH_TOKEN:your_token}
  from-number: ${TWILIO_FROM:+1234567890}

minio:
  endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
  access-key: ${MINIO_ACCESS_KEY:minioadmin}
  secret-key: ${MINIO_SECRET_KEY:minioadmin}
  bucket: ${MINIO_BUCKET:orthopedic-bucket}

aws:
  s3:
    bucket: ${S3_BUCKET:ortho-reports}

cloudinary:
  cloud-name: ${CLOUDINARY_CLOUD_NAME:name}
  api-key: ${CLOUDINARY_API_KEY:key}
  api-secret: ${CLOUDINARY_API_SECRET:secret}

server:
  compression:
    enabled: true
    mime-types: text/html,text/xml,text/plain,text/css,text/javascript,application/javascript,application/json,application/xml
    min-response-size: 1024

logging:
  level:
    root: WARN
    com.orthopedic.api: ERROR
    org.springframework.security: WARN
    org.zalando.logbook: ERROR
