services:
  postgres:
    image: postgres:16-alpine
    environment:
      - POSTGRES_DB=orthopedic
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    ports: ["5432:5432"]

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]

  minio:
    image: minio/minio
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin
    command: server /data
    ports: ["9000:9000", "9001:9001"]

  api:
    build:
      context: ../apps/api
    environment:
      - SPRING_PROFILES_ACTIVE=docker
    depends_on: [postgres, redis, minio]
    ports: ["8080:8080"]

  web:
    build:
      context: ../apps/web
      target: runtime
    ports: ["4200:80"]
    depends_on: [api]
    restart: unless-stopped
    environment:
      - NGINX_HOST=localhost

  admin:
    build:
      context: ../apps/admin
      target: runtime
    ports: ["4201:80"]
    depends_on: [api]
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    ports: ["80:80", "443:443"]
    depends_on: [api, web, admin]
