name: CI

on:
    push:
        branches: [main]
    pull_request:
        branches: [main]

jobs:
    frontend-ci:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - uses: pnpm/action-setup@v2
              with:
                  version: 8
            - uses: actions/setup-node@v4
              with:
                  node-version: 20
                  cache: "pnpm"
            - run: pnpm install
            - run: pnpm exec turbo run build lint test --filter=web
            - run: pnpm exec turbo run build lint test --filter=admin

    docker-build:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - name: Build web image
              run: |
                  docker build -t ghcr.io/org/orthopedic-web:$SHA \
                    apps/web
            - name: Build admin image
              run: |
                  docker build -t ghcr.io/org/orthopedic-admin:$SHA \
                    apps/admin
